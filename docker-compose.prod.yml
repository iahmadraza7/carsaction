# Production stack for Hostinger VPS.
# App + Postgres on an internal Docker network. Only the app is published on
# 127.0.0.1:3000 so Nginx (on the host) can reverse-proxy + terminate TLS.
# Postgres is NEVER exposed to the public internet.

services:
  db:
    image: postgres:16
    container_name: carsaction-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carsaction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-carsaction}
    volumes:
      - carsaction_pgdata:/var/lib/postgresql/data
    networks:
      - carsaction
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsaction} -d ${POSTGRES_DB:-carsaction}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carsaction-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-carsaction}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-carsaction}?schema=public
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      AUTH_TRUST_HOST: "true"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - carsaction_uploads:/app/public/uploads
    networks:
      - carsaction

volumes:
  carsaction_pgdata:
  carsaction_uploads:

networks:
  carsaction:
    driver: bridge
