# Nginx site for carsaction.sg — place at /etc/nginx/sites-available/carsaction
# Certbot will rewrite this file to add SSL listen 443 blocks.

server {
    listen 80;
    listen [::]:80;
    server_name carsaction.sg www.carsaction.sg;

    # Block common scanner paths early
    location ~* /(\.env|\.git|wp-admin|xmlrpc\.php) {
        return 404;
    }

    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
