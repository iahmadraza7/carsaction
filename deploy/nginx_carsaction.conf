# Nginx site for carsaction.sg — HTTP only.
# Copy to /etc/nginx/sites-available/carsaction and symlink into sites-enabled.
# Do NOT add ssl_certificate lines here; Certbot injects SSL after DNS works.
# Does not modify HomeGPT or any other site configs.

server {
    listen 80;
    listen [::]:80;
    server_name carsaction.sg www.carsaction.sg;

    # Let's Encrypt HTTP-01 challenge (must work before SSL exists)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    # Block common scanner paths
    location ~* /(\.env|\.git|wp-admin|xmlrpc\.php) {
        return 404;
    }

    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
