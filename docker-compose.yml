# Local development database for CARSaction.
# Postgres 16. Host port 5433 to avoid clashing with any locally installed Postgres.
# On the VPS this runs on a non-default port and is not exposed publicly.

services:
  db:
    image: postgres:16
    container_name: carsaction-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carsaction
      POSTGRES_PASSWORD: carsaction
      POSTGRES_DB: carsaction
    ports:
      - "5433:5432"
    volumes:
      - carsaction_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carsaction -d carsaction"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  carsaction_pgdata:
